fixed:
  data:
    name: FluidFlowBox
    root: data
    len_time: 51
    delta_t: 0.02
    shifts: [1, 2, 3, 4, 5]
    middle_shifts: [1, 2, 3, 4, 5]
  model:
    widths: [64, 96, 96, 6, 6, 96, 96, 64]
    omega_hidden_widths: [48, 48]
    num_real: 0
    num_complex_pairs: 3
  trainer:
    max_epochs: 1
  runtime:
    seed: 42
search_spaces:
  model.widths:
    type: choice
    values:
      - [64, 64, 6, 6, 64, 64, 64]
      - [64, 96, 96, 6, 6, 96, 96, 64]
  model.omega_hidden_widths:
    type: choice
    values:
      - [32]
      - [48, 48]
  trainer.batch_size:
    type: choice
    values: [64, 128]
  optimizer.lr:
    type: float_log
    low: -4
    high: -3
  loss.reconstruction_weight:
    type: choice
    values: [0.01, 0.1]
  loss.linf_weight:
    type: float_log
    low: -10
    high: -7
  loss.l2_weight:
    type: float_log
    low: -14
    high: -10
num_trials: 2
seed: 7
metric: loss
output_dir: results/search
