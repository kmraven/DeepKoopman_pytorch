data:
    name: RatAuditoryCortex
    # root: data
    root: /mnt/outputs/DeepKoopman_pytorch/data
    len_time: 64
    delta_t: 0.5
    train_files: 1
    input_shape: [8, 8, 6]
    condition_names: [silence, normal_music, gamma_music, gamma_click]
    starts_per_sequence: 1
    shifts: [1, 2, 4, 8, 16, 32, 63]
    middle_shifts: [1, 2, 4, 8, 16, 32, 63]
model:
    widths:
        - 64
        - 256
        - 128
        - 3
        - 3
        - 128
        - 256
        - 64
    omega_hidden_widths:
        - 64
        - 64
    num_real: 1
    num_complex_pairs: 1
    activation: gelu
    architecture: rat_conditional_conv
    condition_dim: 4
loss:
    reconstruction_weight: 1.0
    prediction_weight: 1.0
    middle_shift_weight: 1.0
    covariance_weight: 1.0
    linf_weight: 0.0
    l1_weight: 0.0
    l2_weight: 0.0
optimizer:
    name: adamw
    lr: 0.001
    weight_decay: 1.0e-5
trainer:
    batch_size: 128
    max_epochs: 230
    autoencoder_warmup_epochs: 5
    gradient_clip_val: 1.0
callbacks:
    early_stopping:
        enabled: true
        monitor: val/loss
        mode: min
        patience: 20
        min_delta: 0.0
    model_checkpoint:
        monitor: val/loss
        mode: min
        save_top_k: 1
        save_last: true
        filename: best-{epoch:03d}
runtime:
    seed: 42
    dtype: float32
    device: auto
logging:
    backend: csv
