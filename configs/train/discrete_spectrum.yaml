data:
  name: DiscreteSpectrumExample
  root: data
  len_time: 51
  delta_t: 0.02
  train_files: 1
  shifts:
    start: 1
    stop: 31
    interval: 1
  middle_shifts:
    start: 1
    stop: 51
    interval: 1
model:
  widths:
  - 2
  - 30
  - 30
  - 2
  - 2
  - 30
  - 30
  - 2
  omega_hidden_widths:
  - 10
  - 10
  - 10
  num_real: 2
  num_complex_pairs: 0
  activation: relu
loss:
  reconstruction_weight: 0.1
  middle_shift_weight: 1.0
  linf_weight: 1.0e-07
  l1_weight: 0.0
  l2_weight: 1.0e-15
optimizer:
  lr: 0.001
trainer:
  batch_size: 256
  max_epochs: 900
callbacks:
  model_checkpoint:
    monitor: val/loss
    mode: min
    save_top_k: 1
    filename: best-{epoch:03d}
runtime:
  seed: 42
  dtype: float64
  device: auto
logging:
  backend: csv
